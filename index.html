<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Centro de Telemetria</title>
    <style>
        body {
            background: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 0;
        }

        .header {
            background: #1e293b;
            padding: 20px 40px;
            border-bottom: 1px solid #334155;
        }

        .header h1 {
            margin: 0;
            color: #38bdf8;
            font-size: 1.8em;
        }

        .header p {
            margin: 5px 0 0 0;
            color: #94a3b8;
            font-size: 0.9em;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            padding: 30px 40px;
        }

        .card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
            width: 300px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .card.offline {
            opacity: 0.5;
            filter: grayscale(80%);
            border-color: #ef4444;
        }

        .ip-header {
            color: #f1f5f9;
            font-weight: bold;
            font-size: 1.2em;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .online-dot {
            background: #4ade80;
            box-shadow: 0 0 8px #4ade80;
        }

        .offline-dot {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        .status-text {
            font-size: 0.85em;
            color: #94a3b8;
            margin-bottom: 15px;
            font-weight: 500;
        }

        /* Barras Principais */
        .metric {
            margin: 5px 0;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
        }

        .bar-bg {
            background: #334155;
            height: 8px;
            border-radius: 4px;
            width: 100%;
            margin-top: 5px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            transition: width 0.5s ease-out;
        }

        .bar-cpu {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
        }

        .bar-ram {
            background: linear-gradient(90deg, #34d399, #10b981);
        }

        /* Grid para Métricas Secundárias */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #334155;
            font-size: 0.85em;
            color: #cbd5e1;
        }

        .metrics-grid div {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .metrics-grid span {
            color: #f8fafc;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>Centro de Telemetria e Monitoramento</h1>
        <p>Análise de Hardware, Rede e Processos em Tempo Real</p>
    </div>
    <div id="dashboard" class="container"></div>

    <script>
        async function atualizar() {
            try {
                const response = await fetch('http://54.232.166.204:5000/dados');
                const dispositivos = await response.json();
                const container = document.getElementById('dashboard');
                let html = '';

                for (let ip in dispositivos) {
                    const d = dispositivos[ip];
                    const isOnline = d.status === "Conectado";
                    const cardClass = isOnline ? "card" : "card offline";
                    const dotClass = isOnline ? "status-dot online-dot" : "status-dot offline-dot";
                    const statusMsg = isOnline ? "Operando normalmente" : "Sem comunicação (Offline)";

                    html += `
                        <div class="${cardClass}">
                            <div class="ip-header">
                                <span>🖥️ ${ip}</span>
                                <div class="${dotClass}" title="${d.status}"></div>
                            </div>
                            <div class="status-text">${statusMsg}</div>
                            
                            <div class="metric"><span>CPU:</span> <span>${d.cpu}%</span></div>
                            <div class="bar-bg"><div class="bar-fill bar-cpu" style="width: ${d.cpu}%"></div></div>
                            
                            <div class="metric"><span>RAM:</span> <span>${d.ram}%</span></div>
                            <div class="bar-bg"><div class="bar-fill bar-ram" style="width: ${d.ram}%"></div></div>

                            <div class="metrics-grid">
                                <div>💾 Disco: <span>${d.disco}%</span></div>
                                <div>⚙️ Processos: <span>${d.processos}</span></div>
                                <div title="Total de MB enviados pela placa de rede">⬆️ Rede Out: <span>${d.rede_env} MB</span></div>
                                <div title="Total de MB recebidos pela placa de rede">⬇️ Rede In: <span>${d.rede_rec} MB</span></div>
                                <div>⏱️ Uptime: <span>${d.uptime}h</span></div>
                                <div>⚡ Pwr: <span>${d.energia}</span></div>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html || '<h3 style="color: #64748b;">Aguardando agentes de coleta...</h3>';
            } catch (e) {
                console.error("Erro na API:", e);
            }
        }
        setInterval(atualizar, 2000);
    </script>
</body>

</html>
